<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="footer" style="position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 999;">
      <button id="startBtn" style="padding: 20px; border-radius: 10px; background: #27ae60; color: white; border: none; font-size: 18px; cursor: pointer;">
        1. CLICCA QUI PER ATTIVARE AR
      </button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <video id="vid-it" src="video_it.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
        <video id="vid-fr" src="video_fr.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-marker preset="hiro">
        <a-video src="#vid-it" width="1.6" height="0.9" rotation="-90 0 0" position="0 0 0"></a-video>
      </a-marker>

      <a-marker preset="kanji">
        <a-video src="#vid-fr" width="1.6" height="0.9" rotation="-90 0 0" position="0 0 0"></a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#startBtn');
      const vIt = document.querySelector('#vid-it');
      const vFr = document.querySelector('#vid-fr');

      btn.addEventListener('click', () => {
        // Avvia i video e mettili in pausa subito per "sbloccare" l'audio del browser
        vIt.play().then(() => vIt.pause());
        vFr.play().then(() => vFr.pause());
        
        btn.innerText = "2. INQUADRA UN MARKER";
        btn.style.background = "#2980b9";
      });

      // Logica per far partire il video solo quando il marker è visibile
      document.querySelectorAll('a-marker').forEach(marker => {
        marker.addEventListener('markerFound', () => {
          const videoId = marker.getAttribute('preset') === 'hiro' ? '#vid-it' : '#vid-fr';
          document.querySelector(videoId).play();
        });
        marker.addEventListener('markerLost', () => {
          const videoId = marker.getAttribute('preset') === 'hiro' ? '#vid-it' : '#vid-fr';
          document.querySelector(videoId).pause();
        });
      });
    </script>
  </body>
</html>
