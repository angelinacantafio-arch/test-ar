<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Erasmus AR Project</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ar-ui {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-align: center;
            width: 90%;
        }
        #start-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="ar-ui">
        <button id="start-btn">1. CLICCA PER ATTIVARE AUDIO/VIDEO</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="logarithmicDepthBuffer: true; colorManagement: true;">
        
        <a-assets>
            <video id="vid-it" src="video_it.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
            <video id="vid-fr" src="video_fr.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker preset="hiro" id="marker-it">
            <a-video src="#vid-it" width="1.6" height="0.9" position="0 0.1 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-marker preset="kanji" id="marker-fr">
