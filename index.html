<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        button {
            padding: 20px 40px; font-size: 20px; font-weight: bold;
            background: #27ae60; color: white; border: none; border-radius: 10px;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div id="overlay">
        <button id="btn">AVVIA ESPERIENZA AR</button>
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;" 
             vr-mode-ui="enabled: false"
             renderer="logarithmicDepthBuffer: true; precision: medium;">
        
        <a-assets>
            <video id="v-it" src="video_it.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
            <video id="v-fr" src="video_fr.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker preset="hiro">
            <a-video src="#v-it" width="1.6" height="0.9" position="0 0.5 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-marker preset="kanji">
            <a-video src="#v-fr" width="1.6" height="0.9" position="0 0.5 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#btn');
        const vIt = document.querySelector('#v-it');
        const vFr = document.querySelector('#v-fr');

        btn.addEventListener('click', () => {
            vIt.play(); vIt.pause(); // Sblocco audio
            vFr.play(); vFr.pause();
            document.querySelector('#overlay').style.display = 'none';
        });

        // Forza il play solo quando il marker è visto
        document.querySelectorAll('a-marker').forEach(m => {
            m.addEventListener('markerFound', () => {
                const vid = (m.id === 'marker-it' || m.getAttribute('preset') === 'hiro') ? vIt : vFr;
                vid.play();
            });
            m.addEventListener('markerLost', () => {
                const vid = (m.id === 'marker-it' || m.getAttribute('preset') === 'hiro') ? vIt : vFr;
                vid.pause();
            });
        });
    </script>
</body>
</html>
